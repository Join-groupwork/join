<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join</title>
  <link rel="icon" href="../assets/img/logo-dark.svg" type="image/svg" />
  <link rel="stylesheet" href="../styles/standard.css" />
  <link rel="stylesheet" href="../styles/fonts.css" />
  <link rel="stylesheet" href="../styles/colors.css" />
  <link rel="stylesheet" href="../styles/assets.css" />
  <link rel="stylesheet" href="../styles/join.css" />
  <link rel="stylesheet" href="../member/css/summary.css" />
  <script type="module" src="../scripts/firebase/firebase.js"></script>
  <script type="module" src="../login/auth-guard.js"></script>
  <script type="module" src="../member/js/member-templates.js"></script>
  <script type="module" src="../member/js/member-script.js"></script>
  <script type="module" src="../member/js/summary.js"></script>
</head>

<body>


  <!-- CHECK müssen wir die css KLasse "app" nutzen? oder könne wir das auch anders Lösen? -->
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- TOPBAR -->
    <header class="topbar" id="header"></header>
    <!-- MAIN -->
    <main class="main">
      <!-- DASHBOARD -->
      <section class="dashboard">
        <div class="summary__title">
          <h1>Join 360</h1>
          <h3>Key Metrics at a Glance</h3>
        </div>

        <div class="dashboard-top">
          <div class="dashboard-left">
            <div class="cards">
              <a href="board.html#todo" class="card icon-card todo">
                <span class="card-left-icon" aria-hidden="true"></span>
                <div class="card-right">
                  <div class="card-title">0</div>
                  <div class="card-sub">To-do</div>
                </div>
              </a>

              <a href="board.html#done" class="card icon-card done">
                <span class="card-left-icon" aria-hidden="true"></span>
                <div class="card-right done">
                  <div class="card-title">0</div>
                  <div class="card-sub">Done</div>
                </div>
              </a>
            </div>

            <a href="board.html" class="cards info-row">
              <div class="card urgent-info">
                <div class="urgent-left">
                  <img src="../assets/icons/urgent-prio-summary.svg" alt="Urgent" class="card-left-icon" />
                  <div class="card-right">
                    <div class="card-title">0</div>
                    <div class="card-sub">Urgent</div>
                  </div>
                </div>

                <div class="divider"></div>

                <div class="urgent-right">
                  <div class="date" id="urgentTasks-dead-line">0</div>
                  <div class="small-sub">Upcoming Deadline</div>
                </div>
              </div>
            </a>

            <div class="cards small-cards">
              <a href="board.html#allTasks" class="small-card all-tasks">
                <div class="big">0</div>
                <div class="label">Tasks in Board</div>
              </a>
              <a href="board.html#inProgress" class="small-card tasks-in-progress">
                <div class="big">0</div>
                <div class="label">Tasks In Progress</div>
              </a>
              <a href="board.html#awaitFeedback" class="small-card await-feedback-info">
                <div class="big">0</div>
                <div class="label">Awaiting Feedback</div>
              </a>
            </div>
          </div>

          <div class="dashboard-right">
            <div class="greeting">
              <div class="greeting-line" id="greetingTime">didn't work</div>
              <div class="greeting-line greeting-name" id="greetingName">name or empty</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>


</html>
