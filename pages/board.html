<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="shortcut icon" href="../assets/img/Logo for Favicon construction.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/standard.css">
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/summary_user.css">    
    <script  type="module" src="../assets/templates/sideBar.js"></script>
    <script  type="module" src="../assets/templates/header.js"></script>
    <link rel="stylesheet" href="../styles/board.css">

</head>
<body>

    <aside class="sidebar" id="sidebar"></aside>
  
    <header class="topbar" id="header"></header>


    <div class="main-content">
    <h1>Board</h1>
    <div class="input-section">
        <div class="border"></div>
        <input class="input-feld" placeholder="Find Task" type="text" />
        <button class="add-task-Button">Add task  <img class="plus-icon" src="../assets/icons/add.svg" alt="Plus Icon"></button>
    </div>
    </div>

    <div class="board">
  <div class="column" data-status="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>To do</h3>
    <div class="card" draggable="true" ondragstart="drag(event)" id="task1">
      Task 1
    </div>
  </div>

  <div class="column" data-status="progress" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>In Progress</h3>
  </div>

  <div class="column" data-status="feedback" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Await Feedback</h3>
  </div>

  <div class="column" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Done</h3>
  </div>
</div>




    
</body>
</html>
