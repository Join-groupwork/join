<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join</title>
  <link rel="icon" href="../assets/img/logo-dark.svg" type="image/svg" />
  <link rel="stylesheet" href="../styles/standard.css" />
  <link rel="stylesheet" href="../styles/fonts.css" />
  <link rel="stylesheet" href="../styles/colors.css" />
  <link rel="stylesheet" href="../styles/assets.css" />
  <link rel="stylesheet" href="../styles/join.css" />
  <link rel="stylesheet" href="../member/css/summary.css" />
  <script type="module" src="../scripts/firebase/firebase.js"></script>
  <script type="module" src="../login/auth-guard.js"></script>
  <script type="module" src="../member/js/member-templates.js"></script>
  <script type="module" src="../member/js/member-script.js"></script>
  <script type="module" src="../member/js/summary.js"></script>
</head>

<body class="summary-page">
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="topbar" id="header"></header>

    <main class="main">
      <section class="dashboard">
        <div class="summary__title">
          <h1>Join 360</h1>
          <h3>Key Metrics at a Glance</h3>
        </div>

        <section class="dashboard__top">
          <section class="dashboard__left">
            <section class="cards" aria-label="Task overview">
              <a href="board.html#todo" class="card icon-card todo">
                <span class="card-left-icon" aria-hidden="true"></span>
                <div class="card-right">
                  <div class="card-title">0</div>
                  <div class="card-sub">To-do</div>
                </div>
              </a>

              <a href="board.html#done" class="card icon-card done">
                <span class="card-left-icon" aria-hidden="true"></span>
                <div class="card-right done">
                  <div class="card-title">0</div>
                  <div class="card-sub">Done</div>
                </div>
              </a>
            </section>

            <a href="board.html" class="cards info-row">
              <article class="card urgent-info">
                <div class="urgent-left">
                  <img src="../assets/icons/urgent-prio-summary.svg" alt="Urgent" class="card-left-icon" />
                  <div class="card-right">
                    <div class="card-title">0</div>
                    <div class="card-sub">Urgent</div>
                  </div>
                </div>

                <div class="divider"></div>

                <div class="urgent-right">
                  <div class="date" id="urgentTasks-dead-line">0</div>
                  <div class="small-sub">Upcoming Deadline</div>
                </div>
              </article>
            </a>

            <section class="cards small-cards" aria-label="Board statistics">
              <a href="board.html#allTasks" class="small-card all-tasks">
                <div class="big">0</div>
                <div class="label">Tasks in Board</div>
              </a>
              <a href="board.html#inProgress" class="small-card tasks-in-progress">
                <div class="big">0</div>
                <div class="label">Tasks In Progress</div>
              </a>
              <a href="board.html#awaitFeedback" class="small-card await-feedback-info">
                <div class="big">0</div>
                <div class="label">Awaiting Feedback</div>
              </a>
            </section>
          </section>

          <aside class="dashboard-right">
            <section class="greeting desktop-greeting" aria-label="Greeting">
              <div class="greeting-line" id="greetingTime"></div>
              <div class="greeting-line greeting-name" id="greetingName"></div>
            </section>
          </aside>
        </section>
      </section>
    </main>
  </div>

  <aside class="mobile-greeting-overlay" id="mobileGreetingOverlay" aria-label="Mobile greeting">
    <div class="mobile-greeting-content">
      <div class="greeting-line" id="mobileGreetingTime"></div>
      <div class="greeting-line greeting-name" id="mobileGreetingName"></div>
    </div>
  </aside>

  <footer class="footer__responsive">
    <a href="./summary.html" class="button button__mobile button__mobile--member">
      <img class="icon__mobile" src="../assets/icons/menu/summary__mobile.svg" alt="summary mobile">
    </a>
    <a href="./add-task.html" class="button button__mobile button__mobile--member">
      <img class="icon__mobile" src="../assets/icons/menu/add-task__mobile.svg" alt="add-task mobile">
    </a>
    <a href="./board.html" class="button button__mobile button__mobile--member">
      <img class="icon__mobile" src="../assets/icons/menu/board__mobile.svg" alt="board mobile">
    </a>
    <a href="./contacts.html" class="button button__mobile button__mobile--member">
      <img class="icon__mobile" src="../assets/icons/menu/contacs__mobile.svg" alt="contacts mobile">
    </a>
  </footer>

</body>

</html>
