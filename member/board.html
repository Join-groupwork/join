<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join - Board</title>
  <link rel="icon" href="/assets/img/logo-dark.svg" type="image/svg" />
  <link rel="stylesheet" href="/styles/standard.css">
  <link rel="stylesheet" href="/styles/join.css">
  <link rel="stylesheet" href="/styles/fonts.css">
  <link rel="stylesheet" href="/styles/colors.css">
  <link rel="stylesheet" href="/styles/assets.css">
  <link rel="stylesheet" href="/member/css/board.css">
  <script type="module" src="/scripts/firebase/firebase.js"></script>
  <script type="module" src="/login/auth-guard.js"></script>
  <script type="module" src="/member/js/member-templates.js"></script>
  <script type="module" src="/member/js/member-script.js"></script>
  <script type="module" src="/member/js/drag-n-drop.js"></script>
</head>

<body>

  <header class="topbar" id="header"></header>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="board-main">
    <!-- INFO Der inlinestyle ist nur zum designen -->
    <section name="todo" style="border: 1px solid aqua;">
      <div class="card-bar">
        <h3 class="cards-h3">To do</h3>
        <img class="circle-plus-icon" src="/assets/icons/square-plus.svg" alt="Add task">
      </div>

      <div class="column" class="drag__area" id="todo" data-status="todo" ondrop="drop(event)"
        ondragover="allowDrop(event)" ondragstart="startDragging(id)" ondragover="highlightStart(subtask)"
        ondragleave="highlightStop(subtask)">
        <p class="card-placeholder">No tasks to do</p>
      </div>
    </section>


    <section>
      <div class="card-bar">
        <h3 class="cards-h3">In Progress</h3><img class="circle-plus-icon" src="/assets/icons/square-plus.svg"
          alt="plus-icon">
      </div>
      <div class="column" class="drag__area" id="inProgress" data-status="progress" ondrop="drop(event)"
        ondragover="allowDrop(event)">
        <p class="card-p">No tasks to do</p>
      </div>
    </section>

    <section>
      <div class="card-bar">
        <h3 class="cards-h3">Await Feedback</h3><img class="circle-plus-icon" src="/assets/icons/square-plus.svg"
          alt="plus-icon">
      </div>
      <div class="column" class="drag__area" id="awaitFeedback" data-status="feedback" ondrop="drop(event)"
        ondragover="allowDrop(event)">
        <p class="card-p">No tasks to do</p>
      </div>
    </section>

    <section>
      <div class="card-bar">
        <h3 class="cards-h3 padding-bottom">Done</h3>
      </div>
      <div class="column drag__area" id="done" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)">
        <p class="card-p">No tasks to do</p>
      </div>
    </section>
  </main>
